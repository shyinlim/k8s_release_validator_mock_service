apiVersion: apps/v1
kind: Deployment # Resource type: manages Pod lifecycle
metadata:
  name: mock-service
  labels: # Label for identification and grouping
    app: mock-service
spec:
  replicas: 1 # Number of Pod replicas to run
  selector:
    matchLabels:
      app: mock-service # Which Pods this Deployment manages (match by label)
  template: # Pod template (defines what each Pod looks like)
    metadata:
      labels:
        app: mock-service # Pod label (must match selector above)
    spec:
      containers:
        - name: mock-service # Container name
          image: mock-service:local
          ports:
            - containerPort: 7641
          env:
            - name: APP_VERSION
              value: 'v1'
          readinessProbe: # Readiness Probe: checks if Pod is ready to receive traffic
            httpGet:
              path: /readyz
              port: 7641
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7641
            initialDelaySeconds: 5
            periodSeconds: 10